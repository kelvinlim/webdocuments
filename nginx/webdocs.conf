# webdocs — host nginx config for serving the demo under
#   https://omnikog.asuscomm.com/webdocs
#
# This host (omnikog) already terminates TLS via Certbot and path-proxies many
# apps from a single HTTPS server block in /etc/nginx/conf.d/omnikog.conf.
# webdocs slots into that same pattern. There are TWO pieces:
#
#   1. The `map` below is http{}-level — install it as its own file:
#        /etc/nginx/conf.d/webdocs-http.conf
#      (maps can't live inside a server{} block.)
#
#   2. The two `location` blocks go INSIDE the existing
#        server { ... server_name omnikog.asuscomm.com; (listen 443) ... }
#      block in conf.d/omnikog.conf.
#
# Ports (loopback-only, published by podman-compose):
#   connector (FastAPI)          127.0.0.1:8030
#   Document Server (OnlyOffice) 127.0.0.1:8090
# These avoid the omnikog app range (8000-8005, 8010, 8020).
#
# Matching .env:
#   ROOT_PATH=/webdocs
#   ONLYOFFICE_DS_PUBLIC_URL=/webdocs/ds


# ============================================================================
# PIECE 1 — http{} level → /etc/nginx/conf.d/webdocs-http.conf
# ============================================================================
# Powers the WebSocket Upgrade for the OnlyOffice editor's co-editing channel.
map $http_upgrade $webdocs_connection_upgrade {
    default upgrade;
    ''      close;
}


# ============================================================================
# PIECE 2 — paste INSIDE the omnikog.asuscomm.com :443 server { } block
# ============================================================================

# Defeat ad blockers that drop common/Analytics.js by filename
# (ERR_BLOCKED_BY_CLIENT). It's a require.js dependency, so blocking it stalls
# the editor on a loading skeleton. Rewrite the module path in the editor
# bundles (app.js/code.js) to a neutral name and serve that name from the real
# Analytics.js — works for every browser, no client-side allowlisting. Needs
# nginx's http_sub_module (sub_filter). These regex locations must precede the
# /webdocs/ds/ proxy below.
location ~ ^/webdocs/ds/(?<anltx>(?:[0-9.]+[._-][^/]+/)?web-apps/apps/common/)Anltx\.js$ {
    proxy_pass http://127.0.0.1:8090/${anltx}Analytics.js$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host/webdocs/ds;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location ~ ^/webdocs/ds/(?<appjs>(?:[0-9.]+[._-][^/]+/)?web-apps/apps/.*(?:app|code)\.js)$ {
    proxy_pass http://127.0.0.1:8090/$appjs$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host/webdocs/ds;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";    # uncompressed so sub_filter applies
    sub_filter_once off;
    sub_filter_types application/javascript;
    sub_filter "common/Analytics" "common/Anltx";
}

# Neutralize OnlyOffice's caching service worker. Behind the /webdocs/ds
# subpath the stock worker's fetch() handler throws (TypeError: Failed to
# fetch) and the editor hangs on a loading skeleton — even though every asset
# loads fine directly (verified via curl and in a no-SW InPrivate window).
# Serving a no-op SW (install/activate only, NO fetch listener) means the
# browser never routes requests through it, so assets load straight from the
# network. skipWaiting + clients.claim make it replace the broken worker in
# already-affected browsers on the next load. This regex location must precede
# the /webdocs/ds/ proxy below (regex locations win over prefixes anyway).
location ~ ^/webdocs/ds/(?:[0-9.]+[._-][^/]+/)?document_editor_service_worker\.js$ {
    default_type application/javascript;
    add_header Cache-Control "no-store" always;
    return 200 "self.addEventListener('install',function(){self.skipWaiting()});self.addEventListener('activate',function(e){e.waitUntil(self.clients.claim())});";
}

# OnlyOffice Document Server (editor engine + bundled Zotero plugin).
#
# Sub-path serving works via X-Forwarded-Host carrying the virtual path:
# the DS reads "<host>/webdocs/ds" and emits its asset/API URLs under that
# prefix (OnlyOffice's official virtual-path mechanism). The trailing slash on
# proxy_pass strips /webdocs/ds/ before the request reaches the DS.
location /webdocs/ds/ {
    proxy_pass http://127.0.0.1:8090/;
    proxy_http_version 1.1;

    # WebSocket upgrade (co-editing / live updates).
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $webdocs_connection_upgrade;

    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host/webdocs/ds;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    client_max_body_size 100m;   # large documents / conversions
    proxy_read_timeout   3600s;  # long-lived editing sockets
    proxy_send_timeout   3600s;
}

# Connector (this FastAPI app). FastAPI runs with root_path=/webdocs so it
# generates prefixed links; the trailing slash on proxy_pass strips /webdocs/
# so the app receives bare paths (/login, /editor/<id>, ...).
location /webdocs/ {
    proxy_pass http://127.0.0.1:8030/;
    proxy_http_version 1.1;

    proxy_set_header Host               $host;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Prefix /webdocs;

    client_max_body_size 100m;   # .docx uploads
}
