{% extends "base.html" %}
{% block title %}Sign in — webdocs{% endblock %}
{% block body %}
<main>
  <h1>Sign in</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="{{ root_path }}/login">
    <p><label>Username<br><input name="username" autofocus required></label></p>
    <p><label>Password<br><input name="password" type="password" required></label></p>
    <p><input type="submit" value="Sign in"></p>
  </form>
  <p class="muted">Demo credentials are configured via the DEMO_USERS env var.</p>
</main>
{% endblock %}
